[pytest]
# Pytest configuration for Ikigai Masala

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -m "not slow"

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests — skipped by default. Run with 'pytest -m slow'
          or 'pytest -m ""' to include them.

# Minimum version
minversion = 7.0
